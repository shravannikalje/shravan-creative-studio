services:
  - type: web
    name: shravan-creative-studio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: AUTH_MODE
        value: password
      - key: ACCESS_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CUSTOM_SECTION_PHONE_ONLY
        value: "true"
      - key: CUSTOM_SECTION_REQUIRE_TRUSTED_DEVICE
        value: "true"
