<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Access | Shravan Creative Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0b1020;
            --bg2: #151e3b;
            --card: rgba(255, 255, 255, 0.08);
            --stroke: rgba(255, 255, 255, 0.16);
            --text: #ecf3ff;
            --muted: #b8c3df;
            --danger: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Manrope", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.32), transparent 40%),
                radial-gradient(circle at 90% 25%, rgba(16, 185, 129, 0.22), transparent 35%),
                linear-gradient(155deg, var(--bg1), var(--bg2));
            display: grid;
            place-items: center;
            padding: 1rem;
        }

        .card {
            width: min(520px, 96vw);
            border: 1px solid var(--stroke);
            border-radius: 18px;
            background: var(--card);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            padding: 1.4rem;
            box-shadow: 0 22px 42px rgba(6, 10, 24, 0.5);
        }

        h1 {
            font-size: clamp(1.3rem, 3vw, 2rem);
            margin-bottom: 0.35rem;
        }

        .sub {
            color: var(--muted);
            margin-bottom: 0.95rem;
            line-height: 1.5;
        }

        .hint {
            font-size: 0.92rem;
            color: #d7e4ff;
            margin-bottom: 0.95rem;
        }

        .field {
            display: grid;
            gap: 0.45rem;
            margin-top: 0.7rem;
        }

        .field label {
            font-size: 0.9rem;
            color: #d7e4ff;
            font-weight: 600;
        }

        .field input {
            border: 1px solid var(--stroke);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border-radius: 10px;
            padding: 0.75rem 0.85rem;
            outline: none;
            font-size: 0.95rem;
        }

        .field input:focus {
            border-color: rgba(109, 125, 255, 0.8);
        }

        .btn {
            margin-top: 0.9rem;
            border: 1px solid transparent;
            background: linear-gradient(120deg, #6d7dff, #5364ea);
            color: #fff;
            border-radius: 10px;
            padding: 0.72rem 0.85rem;
            cursor: pointer;
            font-size: 0.94rem;
            font-weight: 700;
            width: 100%;
        }

        .btn:disabled {
            opacity: 0.65;
            cursor: wait;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.65rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            font-size: 0.8rem;
            color: #dbe5ff;
            margin-bottom: 0.7rem;
            background: rgba(255, 255, 255, 0.06);
        }

        .error {
            margin: 0.8rem 0;
            font-size: 0.92rem;
            color: #ffe4e4;
            border: 1px solid rgba(255, 107, 107, 0.55);
            background: rgba(255, 107, 107, 0.13);
            border-radius: 10px;
            padding: 0.65rem 0.75rem;
        }

        .status {
            margin: 0.8rem 0;
            font-size: 0.92rem;
            border-radius: 10px;
            padding: 0.65rem 0.75rem;
        }

        .status.pending {
            color: #e8ecff;
            border: 1px solid rgba(109, 125, 255, 0.55);
            background: rgba(109, 125, 255, 0.16);
        }

        .status.success {
            color: #eaffef;
            border: 1px solid rgba(34, 197, 94, 0.45);
            background: rgba(34, 197, 94, 0.14);
        }

        .hidden {
            display: none;
        }

        .footer-note {
            margin-top: 1rem;
            font-size: 0.84rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="card">
        <p class="badge" id="accessBadge">Private Website Access</p>
        <h1 id="accessTitle">Access with Password</h1>
        <p class="sub" id="accessSub">Gmail login बंद आहे. Password टाकल्यावर website access मिळेल.</p>
        <p class="hint"><strong>Tip:</strong> Owner ने दिलेला password वापरा.</p>

        <div id="errorBox" class="error hidden"></div>
    <div id="statusBox" class="status hidden"></div>

        <form id="passwordForm">
            <div class="field">
                <label for="accessPassword" id="passwordLabel">Website Password</label>
                <input id="accessPassword" name="accessPassword" type="password" placeholder="Enter password" required>
            </div>

            <button class="btn" id="loginBtn" type="submit">Login</button>
        </form>

        <p class="footer-note">जर login होत नसेल तर owner ला password verify करायला सांगा.</p>
    </div>

    <script>
        const passwordForm = document.getElementById("passwordForm");
        const loginBtn = document.getElementById("loginBtn");
        const accessPassword = document.getElementById("accessPassword");
        const errorBox = document.getElementById("errorBox");
        const statusBox = document.getElementById("statusBox");
        const accessBadge = document.getElementById("accessBadge");
        const accessTitle = document.getElementById("accessTitle");
        const accessSub = document.getElementById("accessSub");
        const passwordLabel = document.getElementById("passwordLabel");
        const nextPath = new URLSearchParams(window.location.search).get("next") || "";
        const isAdminPanelRequest = nextPath === "/admin" || nextPath === "/admin.html";
        const ADMIN_DEVICE_TOKEN_STORAGE_KEY = "admin-access-device-token";

        let approvalPollTimer = null;
        let approvalEventSource = null;
        let approvalResolved = false;

        if (isAdminPanelRequest) {
            accessBadge.textContent = "Admin Panel Access";
            accessTitle.textContent = "Open Admin Panel";
            accessSub.textContent = "Owner direct admin password टाकल्यावर लगेच admin panel open होईल. Shared admin password टाकल्यावर owner verification request जाईल.";
            passwordLabel.textContent = "Admin Password";
        }

        function showError(message) {
            clearStatus();
            errorBox.textContent = message;
            errorBox.classList.remove("hidden");
        }

        function clearError() {
            errorBox.textContent = "";
            errorBox.classList.add("hidden");
        }

        function showStatus(message, tone = "pending") {
            statusBox.textContent = message;
            statusBox.className = `status ${tone}`;
            statusBox.classList.remove("hidden");
        }

        function clearStatus() {
            statusBox.textContent = "";
            statusBox.className = "status hidden";
        }

        function setLoginState(disabled, label) {
            loginBtn.disabled = disabled;
            loginBtn.textContent = label;
        }

        function stopApprovalPolling() {
            if (approvalPollTimer) {
                clearInterval(approvalPollTimer);
                approvalPollTimer = null;
            }

            if (approvalEventSource) {
                approvalEventSource.close();
                approvalEventSource = null;
            }
        }

        function createAdminDeviceToken() {
            if (window.crypto && typeof window.crypto.getRandomValues === "function") {
                const bytes = new Uint8Array(24);
                window.crypto.getRandomValues(bytes);
                const randomPart = [...bytes].map((value) => value.toString(16).padStart(2, "0")).join("");
                return `adt_${randomPart}`;
            }

            const chunk = () => Math.random().toString(36).slice(2, 12);
            return `adt_${Date.now().toString(36)}_${chunk()}${chunk()}`;
        }

        function getOrCreateAdminDeviceToken() {
            const tokenPattern = /^[a-zA-Z0-9_-]{16,220}$/;

            try {
                const existing = String(localStorage.getItem(ADMIN_DEVICE_TOKEN_STORAGE_KEY) || "").trim();
                if (tokenPattern.test(existing)) {
                    return existing;
                }

                const generatedToken = createAdminDeviceToken();
                localStorage.setItem(ADMIN_DEVICE_TOKEN_STORAGE_KEY, generatedToken);
                return generatedToken;
            } catch (error) {
                return createAdminDeviceToken();
            }
        }

        function getAdminDeviceLabel() {
            const platform = String(navigator.platform || "Unknown device").trim();
            const browserMatch = navigator.userAgent.match(/(Edg|Chrome|Firefox|Safari|OPR)\/[^\s]+/);
            const browser = browserMatch ? browserMatch[0].replace("OPR", "Opera") : "Browser";
            return `${platform} • ${browser}`.slice(0, 140);
        }

        async function checkAdminApproval(requestId) {
            if (approvalResolved) return;

            try {
                const res = await fetch(`/auth/admin-approval-status?requestId=${encodeURIComponent(requestId)}`, {
                    cache: "no-store"
                });
                const data = await res.json();

                if (data?.approved && data?.redirectTo) {
                    approvalResolved = true;
                    stopApprovalPolling();
                    showStatus("Successfully verified ✅ Admin panel उघडतोय...", "success");
                    setTimeout(() => {
                        window.location.href = data.redirectTo;
                    }, 700);
                    return;
                }

                if (data?.status === "rejected" || res.status === 403) {
                    approvalResolved = true;
                    stopApprovalPolling();
                    setLoginState(false, "Login");
                    showError(data.error || "Owner ने verify नाही केलं. Admin panel access मिळाला नाही.");
                    return;
                }

                if (!res.ok && data?.status !== "pending") {
                    stopApprovalPolling();
                    setLoginState(false, "Login");
                    showError(data.error || "Admin approval check failed.");
                }
            } catch (error) {
                stopApprovalPolling();
                setLoginState(false, "Login");
                showError("Owner verification status check failed. Try again.");
            }
        }

        function startApprovalRealtimeStream(requestId) {
            if (typeof window.EventSource !== "function") return;

            if (approvalEventSource) {
                approvalEventSource.close();
                approvalEventSource = null;
            }

            approvalEventSource = new EventSource(`/auth/admin-approval-stream?requestId=${encodeURIComponent(requestId)}`);

            approvalEventSource.onmessage = async (event) => {
                if (approvalResolved) return;

                try {
                    const payload = JSON.parse(event.data || "{}");
                    const status = String(payload?.status || "pending").toLowerCase();

                    if (status === "approved" || status === "rejected") {
                        await checkAdminApproval(requestId);
                    }
                } catch (error) {
                    // ignore malformed realtime payload and continue with polling fallback
                }
            };

            approvalEventSource.onerror = () => {
                if (approvalEventSource) {
                    approvalEventSource.close();
                    approvalEventSource = null;
                }
            };
        }

        function startApprovalPolling(requestId) {
            stopApprovalPolling();
            approvalResolved = false;
            setLoginState(true, "Waiting for owner...");
            showStatus("Owner verification pending. Owner verify केल्यावर admin panel access मिळेल.", "pending");
            startApprovalRealtimeStream(requestId);
            approvalPollTimer = setInterval(() => {
                checkAdminApproval(requestId);
            }, 1000);
        }

        passwordForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            stopApprovalPolling();
            approvalResolved = false;
            clearError();
            clearStatus();

            const password = accessPassword.value.trim();
            if (!password) {
                showError("Password टाका.");
                return;
            }

            setLoginState(true, "Checking...");
            let waitingForOwner = false;

            try {
                const res = await fetch("/auth/password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        password,
                        next: nextPath,
                        adminDeviceToken: getOrCreateAdminDeviceToken(),
                        adminDeviceLabel: getAdminDeviceLabel()
                    })
                });

                const data = await res.json();
                if (data?.approvalRequired && data?.requestId) {
                    waitingForOwner = true;
                    startApprovalPolling(data.requestId);
                    await checkAdminApproval(data.requestId);
                    return;
                }

                if (!res.ok || !data.ok) {
                    showError(data.error || "Login failed");
                    return;
                }

                window.location.href = data.redirectTo || "/";
            } catch (error) {
                showError("Network error while login. Try again.");
            } finally {
                if (!waitingForOwner) {
                    setLoginState(false, "Login");
                }
            }
        });
    </script>
</body>
</html>
